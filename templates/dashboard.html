<!DOCTYPE html>
<html>
<head>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body class="bg-[#0f172a] text-white">
    {% include 'components/navbar.html' %}

<div class="max-w-7xl mx-auto p-4 pt-24">

<h1 class="text-3xl font-bold mb-2">Dashboard</h1>

<!-- ================= ROW 1 ================= -->
<!-- ================= ROW 1 ================= -->
<div class="grid md:grid-cols-2 gap-6 mb-6">

    <!-- COST PREDICTION (DONUT) -->
    <div class="bg-slate-800 p-4 rounded-xl h-[260px] flex flex-col">

        <!-- Title (top, centered or left your choice) -->
        <h2 class="mb-2 text-sm text-cyan-400 text-left">
          Cost Prediction (₹)
        </h2>
      
        <!-- Donut perfectly centered -->
        <div class="flex-1 flex items-center justify-center">
  
          <div class="w-48 h-48 flex items-center justify-center">
            <canvas id="costChart"></canvas>
          </div>
        
        </div>
      
        <!-- Value -->

      
      </div>
  
    <!-- CHANGE IN COST (BAR) -->
    <div class="bg-slate-800 p-6 rounded-xl h-[260px]">
      <h2 class="text-sm  text-purple-400">Change in Cost (Last 5)</h2>
      <canvas id="costChangeChart"></canvas>
    </div>
  
  </div>

<!-- ================= ROW 2 ================= -->
<div class="grid md:grid-cols-2 gap-6 mb-6">

  <!-- ENERGY USAGE -->
  <div class="bg-slate-800 p-6 rounded-xl h-[260px]">
    <h2 class="">Energy Usage (kWh)</h2>
    <canvas id="energyChart"></canvas>
  </div>

  <!-- FUTURE TREND -->
  <div class="bg-slate-800 p-6 rounded-xl h-[260px]">
    <h2 class="">Future Trend (Season)</h2>
    <canvas id="futureChart"></canvas>
  </div>

</div>

<!-- ================= ROW 3 ================= -->
<div class="grid md:grid-cols-2 gap-6 mb-6">

  <!-- ACTIVE APPLIANCES (BAR) -->
  <div class="bg-slate-800 p-6 rounded-xl h-[260px]">
    <h2 class="">Active Appliances</h2>
    <canvas id="applianceChart"></canvas>
  </div>

  <!-- CO2 -->
  <div class="bg-slate-800 p-6 rounded-xl h-[260px]">
    <h2 class="">Carbon Footprint</h2>
    <canvas id="co2Chart"></canvas>
  </div>

</div>

<!-- ================= ROW 4 ================= -->
<div class="bg-slate-800 p-6 rounded-xl h-[260px]">
  <h2 class="mb-4">Recommendations</h2>

  <div id="tips" class="grid md:grid-cols-3 gap-4"></div>
</div>

</div>

<script>
// ================= DATA =================
// ================= DATA =================
const history = JSON.parse(localStorage.getItem("history")) || [];

// take latest safely
const latest = history.length > 0 ? history[history.length - 1] : {};

const ELECTRICITY_RATE = 8;

// labels
const labels = history.map((_, i) => "Month " + (i + 1));

// ================= COMMON DATA =================
const energyData = history.map(h => h.energy || 0);
const co2Data = history.map(h => h.co2 || 0);
const costData = energyData.map(e => e * ELECTRICITY_RATE);


// ================= 1. COST DONUT =================
// ✅ Plugin to draw text inside donut
const centerTextPlugin = {
  id: 'centerText',
  beforeDraw(chart) {
    const { width } = chart;
    const { height } = chart;
    const ctx = chart.ctx;

    ctx.restore();

    const fontSize = (height / 114).toFixed(2);
    ctx.font = fontSize + "em sans-serif";
    ctx.textBaseline = "middle";

    const text = "₹ " + currentCost.toFixed(0);
    const textX = Math.round((width - ctx.measureText(text).width) / 2);
    const textY = height / 2;

    ctx.fillStyle = "#22d3ee"; // cyan color
    ctx.fillText(text, textX, textY);

    ctx.save();
  }
};


const energy = latest.energy || 0;

// season-based realistic variation
const futureData = [
  energy * 0.8,  // Winter (low usage)
  energy * 1.3,  // Summer (high AC)
  energy * 1.1,  // Rainy
  energy * 0.9,  // Spring
  energy * 1.0   // Autumn
];
const currentCost = energy * ELECTRICITY_RATE;
const maxCost = 10000;

new Chart(document.getElementById("costChart"), {
  type: "doughnut",
  data: {
    labels: ["Cost", "Remaining"],
    datasets: [{
      data: [currentCost, Math.max(maxCost - currentCost, 0)],
      backgroundColor: ["#06b6d4", "#1e293b"],
      borderWidth: 0
    }]
  },
  options: {
    responsive: true,
    maintainAspectRatio: false,
    cutout: "70%",
    plugins: {
      legend: { display: false }
    }
  },
  plugins: [centerTextPlugin] // 🔥 ADD THIS
});

// ₹ value


// ================= 2. COST CHANGE (BAR) =================
new Chart(document.getElementById("costChangeChart"), {
  type: "bar",
  data: {
    labels: labels,
    datasets: [{
      label: "Cost (₹)",
      data: costData,
      backgroundColor: "#7c3aed"
    }]
  },
  options: {
    scales: {
      x: {
        title: { display: true, text: "Months", color: "white" },
        ticks: { color: "white" }
      },
      y: {
        title: { display: true, text: "Cost ₹", color: "white" },
        ticks: { color: "white" }
      }
    }
  }
});

// ================= 3. ENERGY =================
// X = Months, Y = Energy
new Chart(document.getElementById("energyChart"), {
  type: "bar",
  data: {
    labels: labels,
    datasets: [{
      label: "Energy (kWh)",
      data: energyData,
      backgroundColor: "#22c55e"
    }]
  },
  options: {
    scales: {
      x: { title: { display: true, text: "Months", color: "white" }, ticks: { color: "white" } },
      y: { title: { display: true, text: "kWh", color: "white" }, ticks: { color: "white" } }
    }
  }
});

// ================= 4. FUTURE TREND =================
// static for now
new Chart(document.getElementById("futureChart"), {
    type: "line",
    data: {
      labels: ["Winter","Summer","Rainy","Spring","Autumn"],
      datasets: [{
        label: "Predicted Energy (kWh)",
        data: futureData,
        borderColor: "#f59e0b",
        backgroundColor: "rgba(245,158,11,0.2)",
        fill: true,
        tension: 0.4
      }]
    },
    options: {
      scales: {
        x: {
          title: { display: true, text: "Seasons", color: "white" },
          ticks: { color: "white" }
        },
        y: {
          title: { display: true, text: "Energy (kWh)", color: "white" },
          ticks: { color: "white" }
        }
      }
    }
  });
// ================= 5. APPLIANCES =================
// X = Appliances, Y = Energy
const last = history.slice(-1)[0] || {};

new Chart(document.getElementById("applianceChart"), {
  type: "bar",
  data: {
    labels: ["AC","Fan","Light","Fridge","Washing"],
    datasets: [{
      label: "Energy Usage",
      data: [
        last.breakdown?.ac || 0,
        last.breakdown?.fan || 0,
        last.breakdown?.light || 0,
        last.breakdown?.fridge || 0,
        last.breakdown?.washing || 0
      ],
      backgroundColor: [
        "#ef4444","#22c55e","#eab308","#3b82f6","#a855f7"
      ]
    }]
  },
  options: {
    scales: {
      x: { title: { display: true, text: "Appliances", color: "white" }, ticks: { color: "white" } },
      y: { title: { display: true, text: "Energy kWh", color: "white" }, ticks: { color: "white" } }
    }
  }
});

// ================= 6. CO2 =================
// X = Months, Y = CO2
new Chart(document.getElementById("co2Chart"), {
  type: "bar",
  data: {
    labels: labels,
    datasets: [{
      label: "CO2 (kg)",
      data: co2Data,
      backgroundColor: "#f43f5e"
    }]
  }
});

// ================= 7. RECOMMENDATIONS =================
// Combine everything (recommendations + facts)
const tips = [
  // Recommendations
  "Install a home energy monitoring system to track real-time usage.",
  "Shift heavy appliance usage to off-peak hours.",
  "Use motion sensor lighting to avoid unnecessary electricity usage.",
  "Upgrade to inverter ACs for better efficiency.",
  "Install smart plugs to control appliances remotely.",
  "Use solar water heaters instead of electric geysers.",
  "Replace old HVAC systems with energy-efficient heat pumps.",
  "Optimize refrigerator settings (3–5°C fridge, -18°C freezer).",
  "Use ceiling insulation and reflective roofing in hot climates.",
  "Switch to induction cooktops for better efficiency.",
  "Use automatic timers for outdoor lighting.",
  "Upgrade to dual inverter refrigerators.",
  "Install rainwater harvesting systems.",
  "Use laptops instead of desktops to save energy.",
  "Enable eco-mode in appliances.",

  // Facts
  "Energy Star refrigerators use up to 35% less electricity.",
  "Efficient washing machines use 25% less energy and 33% less water.",
  "Renewable energy can reduce up to 2.5 tons of CO₂ per year.",
  "LED bulbs use 75% less energy than traditional bulbs.",
  "Heating and cooling use nearly 50% of home energy.",
  "Proper insulation saves 15–20% energy annually.",
  "Standby power consumes 5–10% of electricity.",
  "Solar panels reduce electricity bills by up to 90%.",
  "Electric vehicles produce fewer emissions.",
  "Smart thermostats reduce bills by 10–15%.",
  "ACs consume about 6% of total electricity.",
  "Cold water washing saves up to 90% energy."
];

// Shuffle function (Fisher-Yates Algorithm)
// Shuffle function
function shuffleArray(array) {
  for (let i = array.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [array[i], array[j]] = [array[j], array[i]];
  }
}

const tipsDiv = document.getElementById("tips");

// Function to render tips
function renderTips() {
  tipsDiv.innerHTML = ""; // clear old tips

  shuffleArray(tips);
  const selectedTips = tips.slice(0, 6);

  selectedTips.forEach(t => {
    tipsDiv.innerHTML += `
      <div class="p-4 bg-purple-500/10 border border-purple-500/30 rounded-lg">
        ${t}
      </div>
    `;
  });
}

// Initial load
renderTips();

// Refresh every 10 sec
setInterval(renderTips, 10000);


</script>

</body>
</html>
