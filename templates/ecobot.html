<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>EcoBot - EcoPredict AI</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gradient-to-br from-slate-950 via-slate-900 to-slate-950 text-white min-h-screen">

<!-- NAVBAR -->
{% include 'components/navbar.html' %}

<section class="pt-28 pb-16 px-4">

  <!-- PAGE CONTAINER -->
  <div class="max-w-4xl mx-auto text-center">

    <!-- 🔥 HEADING -->
    <h1 class="text-4xl md:text-5xl font-bold mb-3
    bg-gradient-to-r from-emerald-400 via-cyan-400 to-teal-400
    bg-clip-text text-transparent leading-tight">
      EcoBot AI Assistant ✨
    </h1>

    <p class="text-gray-400 mb-8 text-sm">
      Ask anything about energy saving ⚡
    </p>

    <!-- 💬 CHAT BOX -->
    <div class="bg-white/5 backdrop-blur-xl border border-white/10 
    rounded-2xl shadow-xl flex flex-col 
    h-[420px] max-w-4xl mx-auto overflow-hidden">

      <!-- Messages -->
      <div id="chat" class="flex-1 overflow-y-auto p-5 space-y-3">

        <!-- Default bot -->
        <div class="flex">
          <div class="bg-slate-700/50 px-4 py-2 rounded-lg text-sm">
            Hello! I'm EcoBot ✨. How can I help?
          </div>
        </div>

      </div>

      <!-- Input -->
      <div class="border-t border-white/10 p-3 flex gap-2">

        <input id="input"
          type="text"
          placeholder="Ask about energy..."
          class="flex-1 px-4 py-2 rounded-lg bg-black/40 border border-white/10 text-sm focus:outline-none"
          onkeypress="if(event.key === 'Enter') sendMessage()">

        <button onclick="sendMessage()"
          class="px-4 py-2 rounded-lg text-sm
          bg-gradient-to-r from-emerald-500 to-teal-600 
          hover:scale-105 transition">
          Send
        </button>

      </div>

    </div>

    <!-- ⚡ SUGGESTIONS -->
    <div class="mt-6 grid grid-cols-2 md:grid-cols-4 gap-3 max-w-2xl mx-auto">

      <button onclick="quick('How to reduce energy usage?')"
        class="p-3 rounded-lg bg-white/5 border border-white/10
        hover:bg-white/10 transition text-xs text-gray-300">
        ⚡ Reduce Energy
      </button>

      <button onclick="quick('How to save electricity cost?')"
        class="p-3 rounded-lg bg-white/5 border border-white/10
        hover:bg-white/10 transition text-xs text-gray-300">
        💰 Save Cost
      </button>

      <button onclick="quick('Tips for AC usage')"
        class="p-3 rounded-lg bg-white/5 border border-white/10
        hover:bg-white/10 transition text-xs text-gray-300">
        ❄️ AC Tips
      </button>

      <button onclick="quick('Lighting energy saving tips')"
        class="p-3 rounded-lg bg-white/5 border border-white/10
        hover:bg-white/10 transition text-xs text-gray-300">
        💡 Lighting
      </button>

    </div>

  </div>
</section>

<!-- JS (UNCHANGED LOGIC) -->
<script>
async function sendMessage() {
  const input = document.getElementById("input");
  const text = input.value.trim();
  if (!text) return;

  addMessage(text, "user");
  input.value = "";

  try {
    const response = await fetch("/chat", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ message: text })
    });

    const data = await response.json();
    addMessage(data.reply, "bot");

  } catch (error) {
    addMessage("⚠️ Error connecting to EcoBot", "bot");
  }
}

function quick(text) {
  sendMessageWithText(text);
}

async function sendMessageWithText(text) {
  addMessage(text, "user");

  try {
    const response = await fetch("/chat", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ message: text })
    });

    const data = await response.json();
    addMessage(data.reply, "bot");

  } catch (error) {
    addMessage("⚠️ Error connecting to EcoBot", "bot");
  }
}

function addMessage(text, sender) {
  const chat = document.getElementById("chat");

  const div = document.createElement("div");
  div.className = sender === "user" ? "flex justify-end" : "flex justify-start";

  const msg = document.createElement("div");
  msg.className = sender === "user"
    ? "bg-emerald-600 px-4 py-2 rounded-lg text-sm max-w-xs"
    : "bg-slate-700/50 px-4 py-2 rounded-lg text-sm max-w-xs text-left";
  
  msg.innerText = text;
  div.appendChild(msg);
  chat.appendChild(div);

  chat.scrollTop = chat.scrollHeight;
}
</script>

</body>
</html>
